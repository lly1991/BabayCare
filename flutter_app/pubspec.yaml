name: babycare_flutter
description: BabyCare rewritten with Flutter architecture.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.3
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4
  image_picker: ^1.1.2
  video_player: ^2.9.1
  intl: ^0.19.0
  file_picker: ^8.0.7
  share_plus: ^10.1.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  sqflite_common_ffi: ^2.3.6

hooks:
  user_defines:
    sqlite3:
      source: system

flutter:
  uses-material-design: true
